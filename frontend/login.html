{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>
    <div class="data-grid">
        <div class="dot thick p1"></div>
        <div class="dot thick p2"></div>
        <div class="dot thick p3"></div>
        <div class="dot thick p4"></div>
        
        <div class="dot thin p5"></div>
        <div class="dot thin p6"></div>
        <div class="dot thin p7"></div>
        <div class="dot thin p8"></div>
        <div class="dot thin p9"></div>
        <div class="dot thin p10"></div>
        <div class="dot thin p11"></div>
        <div class="dot thin p12"></div>
    </div>
    <div class="login-container">
        <h2>Login</h2>
        {% if messages %}
            <ul class="django-messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="e-mail">E-Mail ID</label>
                <input type="text" id="e-mail" name="email" placeholder="Enter your e-mail id" autocomplete="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="extra-links">
            <p><a href="{% url 'forgot_password' %}">Forgot Password?</a></p>
            <p>Not a member?<a href="{% url 'signup' %}">Sign Up Now</a></p>
        </div>
    </div>
</body>
</html>
