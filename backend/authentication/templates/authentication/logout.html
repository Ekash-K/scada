{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>
    <div class="data-grid">
        <div class="dot thick p1"></div>
        <div class="dot thick p2"></div>
        <div class="dot thick p3"></div>
        <div class="dot thick p4"></div>
        
        <div class="dot thin p5"></div>
        <div class="dot thin p6"></div>
        <div class="dot thin p7"></div>
        <div class="dot thin p8"></div>
        <div class="dot thin p9"></div>
        <div class="dot thin p10"></div>
        <div class="dot thin p11"></div>
        <div class="dot thin p12"></div>
    </div>
    <div class="login-container" style="text-align: center;">
        <h2 style="font-size: 2em; margin-bottom: 20px;">Session Terminated</h2>
        <p style="color: #88ccee; margin-bottom: 30px; letter-spacing: 1px;">You have been logged out successfully.</p>
        <a href="{% url 'login' %}" class="login-btn" style="display: block; text-decoration: none; text-align: center;">Return to Login</a>
    </div>
</body>
</html>
