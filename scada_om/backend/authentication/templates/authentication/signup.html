{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>
    <div class="data-grid">
        <div class="dot thick p1"></div>
        <div class="dot thick p2"></div>
        <div class="dot thick p3"></div>
        <div class="dot thick p4"></div>
        
        <div class="dot thin p5"></div>
        <div class="dot thin p6"></div>
        <div class="dot thin p7"></div>
        <div class="dot thin p8"></div>
        <div class="dot thin p9"></div>
        <div class="dot thin p10"></div>
        <div class="dot thin p11"></div>
        <div class="dot thin p12"></div>
    </div>
    <div class="login-container">
        <h2>Register</h2>
        {% if messages %}
            <ul class="django-messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="email">E-Mail ID</label>
                <input type="email" id="email" name="email" placeholder="Enter your e-mail ID" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>
            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="login-btn">Sign Up</button>
        </form>
        <div class="extra-links">
            <p>Already a member?<a href="{% url 'login' %}">Login Now</a></p>
        </div>
    </div>
</body>
</html>
