{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA Dashboard</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="data-grid">
        <div class="dot thick p1"></div>
        <div class="dot thick p2"></div>
        <div class="dot thick p3"></div>
        <div class="dot thick p4"></div>
        
        <div class="dot thin p5"></div>
        <div class="dot thin p6"></div>
        <div class="dot thin p7"></div>
        <div class="dot thin p8"></div>
        <div class="dot thin p9"></div>
        <div class="dot thin p10"></div>
        <div class="dot thin p11"></div>
        <div class="dot thin p12"></div>
    </div>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SCADA <span>O&M</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'dashboard' %}" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="{% url 'user_master' %}" class="nav-item"><i class="fas fa-users"></i> User Master</a>
                <a href="{% url 'site_master' %}" class="nav-item"><i class="fas fa-building"></i> Site Master</a>
                <a href="{% url 'device_master' %}" class="nav-item"><i class="fas fa-microchip"></i> Device Master</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="topbar-title">System Overview</div>
                
                <div class="topbar-actions">
                    <button class="action-btn" onclick="toggleFullScreen()" title="Toggle Fullscreen">
                        <i class="fas fa-expand"></i>
                    </button>
                    <a href="{% url 'logout' %}" class="logout-btn-red">
                        <i class="fas fa-power-off"></i> Logout
                    </a>
                </div>
            </header>
            
            <div class="content-area">
                <h2>Welcome to the Control Grid</h2>
                <p style="color: #88ccee; margin-top: 10px;">Select a master module from the sidebar to begin configuration.</p>
                </div>
        </div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
